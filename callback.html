<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>OAuth Callback — Fulove Media</title>
<style>
body{font-family:system-ui;max-width:640px;margin:3rem auto;padding:0 1rem;line-height:1.5}
.box{background:#f4f4f4;border:1px solid #ddd;border-radius:8px;padding:1rem;word-break:break-all;font-family:ui-monospace,monospace;font-size:14px}
button{margin-top:0.75rem;padding:0.5rem 1rem;border:0;background:#111;color:#fff;border-radius:6px;cursor:pointer}
.err{color:#b00}
.ok{color:#0a0}
</style></head>
<body>
<h1>OAuth callback</h1>
<p id="status">Parsing response…</p>
<div class="box" id="code">—</div>
<button id="copy">Copy code</button>
<p>Paste this code back into your terminal to finish auth.</p>
<script>
const p=new URLSearchParams(location.search);
const code=p.get("code"),err=p.get("error"),errd=p.get("error_description");
const s=document.getElementById("status"),c=document.getElementById("code"),b=document.getElementById("copy");
if(err){s.innerHTML='<span class="err">Error: '+err+'</span>';c.textContent=errd||err;b.style.display="none"}
else if(code){s.innerHTML='<span class="ok">Authorization received.</span>';c.textContent=code;b.onclick=()=>{navigator.clipboard.writeText(code);b.textContent="Copied!"}}
else{s.innerHTML='<span class="err">No code in URL.</span>';b.style.display="none"}
</script>
</body></html>
